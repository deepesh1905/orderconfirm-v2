<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderConfirm Bot - WhatsApp Automation</title>
    <style>
        /* --- BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0a0a0a; color: #ffffff; line-height: 1.6; }

        /* --- NAVBAR --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: #121212; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: bold; color: #25D366; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #aaa; text-decoration: none; transition: 0.3s; font-size: 15px; }
        .nav-links a:hover { color: #fff; }
        .btn-nav { background-color: #25D366; color: #000 !important; padding: 10px 20px; border-radius: 6px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .btn-nav:hover { background-color: #1ebd54; }

        /* --- HERO SECTION --- */
        .hero { text-align: center; padding: 100px 20px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 52px; margin-bottom: 20px; line-height: 1.2; font-weight: 800; }
        .hero h1 span { color: #25D366; }
        .hero p { font-size: 18px; color: #aaa; margin-bottom: 40px; }
        
        /* --- BUTTONS --- */
        .btn-group { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .btn-primary { background-color: #25D366; color: #000; padding: 15px 35px; border-radius: 8px; font-size: 18px; font-weight: bold; text-decoration: none; border: none; transition: 0.3s; }
        .btn-secondary { background-color: transparent; color: #fff; padding: 15px 35px; border-radius: 8px; font-size: 18px; border: 2px solid #25D366; text-decoration: none; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); background-color: #1ebd54; }
        .btn-secondary:hover { background-color: rgba(37, 211, 102, 0.1); }

        /* --- 📱 MOBILE RESPONSIVE MAGIC --- */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 20px; padding: 20px; text-align: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 15px; }
            .btn-nav { width: 100%; display: inline-block; margin-top: 10px; }
            
            .hero { padding: 50px 15px; }
            .hero h1 { font-size: 36px; }
            .hero p { font-size: 16px; }
            
            .btn-group { flex-direction: column; width: 100%; gap: 15px; }
            .btn-primary, .btn-secondary { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">✅ OrderConfirm</div>
        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">How it Works</a>
            <a href="/login.html" class="btn-nav">Login / Free Trial</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Reduce RTO by <span>50%</span> with WhatsApp Automation!</h1>
        <p>Automatically confirm customer addresses the moment an order is placed. Just ₹5 per successful order. Save thousands on shipping dead weight.</p>
        
        <div class="btn-group">
            <a href="/signup.html" class="btn-primary">🚀 Start Free Trial</a>
            <a href="#how-it-works" class="btn-secondary">How It Works?</a>
        </div>
    </div>

</body>
</html>
