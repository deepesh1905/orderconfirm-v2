<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - OrderConfirm Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: #111; border-bottom: 1px solid #222; }
        nav .logo { font-size: 24px; font-weight: bold; color: #25D366; }
        nav a { color: white; text-decoration: none; }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        
        .form-box { background: #111; border: 1px solid #222; border-radius: 20px; padding: 50px; width: 100%; max-width: 450px; }
        .form-box h2 { font-size: 28px; margin-bottom: 8px; text-align: center; }
        .form-box h2 span { color: #25D366; }
        .form-box p { color: #aaa; text-align: center; margin-bottom: 35px; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .form-group input { width: 100%; padding: 14px 18px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: #25D366; }
        .form-group input::placeholder { color: #555; }

        .btn-submit { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: #1da851; }

        .login-link { text-align: center; margin-top: 20px; color: #aaa; font-size: 14px; }
        .login-link a { color: #25D366; text-decoration: none; }

        .trial-badge { background: #1a2e1a; border: 1px solid #25D366; border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 25px; }
        .trial-badge p { color: #25D366; margin: 0; font-weight: bold; }

        .divider { display: flex; align-items: center; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #333; }
        .divider span { padding: 0 15px; color: #555; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">✅ OrderConfirm</div>
        <a href="index.html">← Wapas Jao</a>
    </nav>

    <div class="container">
        <div class="form-box">
            <h2>Shuru Karo <span>Free Trial!</span></h2>
            <p>Account banao aur 10 orders bilkul free try karo</p>

            <div class="trial-badge">
                <p>🎉 10 Orders FREE Trial — Koi Credit Card Nahi!</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Aapka Naam</label>
                    <input type="text" id="name" placeholder="Jaise: Rahul Sharma" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="aapka@email.com" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" id="phone" placeholder="91XXXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>Business/Shop Ka Naam</label>
                    <input type="text" id="business" placeholder="Jaise: Rahul Fashion Store" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Kam se kam 6 characters" required>
                </div>

                <button type="submit" class="btn-submit">🚀 Free Trial Shuru Karo</button>
            </form>

            <div class="login-link">
                Pehle se account hai? <a href="login.html">Login Karo</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                business: document.getElementById('business').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('https://order-confirm-website.onrender.com/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Account ban gaya! Dashboard pe redirect ho rahe hain...');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('❌ Error: ' + result.message);
                }
            } catch (err) {
                alert('⚠️ Server se connect nahi ho pa raha — thodi der baad try karo!');
            }
        });
    </script>

</body>
</html>
