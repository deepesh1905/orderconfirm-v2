<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OrderConfirm Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0a0a0a; color: #ffffff; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: #121212; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: bold; color: #25D366; text-decoration: none; }
        .back-link { color: #aaa; text-decoration: none; transition: 0.3s; }
        .back-link:hover { color: #fff; }

        .auth-container { max-width: 450px; width: 90%; margin: 80px auto; background-color: #121212; padding: 40px; border-radius: 12px; border: 1px solid #222; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-size: 28px; color: #ffffff; margin-bottom: 10px; }
        .auth-header p { color: #888; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; background-color: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; font-size: 15px; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #25D366; }
        
        .btn-submit { width: 100%; padding: 14px; background-color: #25D366; color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background-color: #1ebd54; }

        .switch-page { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .switch-page a { color: #25D366; text-decoration: none; }

        @media (max-width: 600px) {
            .auth-container { padding: 30px 20px; margin: 40px auto; }
            .auth-header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/index.html" class="logo">✅ OrderConfirm</a>
        <a href="/index.html" class="back-link">← Go Back</a>
    </nav>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Login to manage your automation dashboard.</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="switch-page">
            Don't have an account? <a href="/signup.html">Start Free Trial</a>
        </div>
    </div>

</body>
</html>
